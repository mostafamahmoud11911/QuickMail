<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Mail</title>
    <link href="css/output.css" rel="stylesheet" />
  </head>
  <body class="bg-indigo-100 min-h-screen flex items-center justify-center">
    <div
      class="shadow-lg rounded-xl flex flex-col gap-4 p-6 m-4 bg-white/80 backdrop-blur-sm w-full max-w-lg border border-gray-200"
    >
      <div class="flex items-center gap-2">
        <select
          id="greeting"
          class="w-full p-3 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-300 transition"
        >
          <option disabled selected>Select a greeting...</option>
          <option>Hello</option>
          <option>Hi there</option>
          <option>Dear</option>
          <option>Greetings</option>
          <option>Good day</option>
        </select>

        <select
          id="title"
          class="w-full p-3 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-300 transition"
        >
          <option disabled selected>Select a title...</option>
          <option>Mr.</option>
          <option>Ms.</option>
          <option>Mrs.</option>
          <option>Miss</option>
          <option>Dr.</option>
          <option>Eng.</option>
        </select>

        <input
          id="name"
          type="text"
          placeholder="Enter name"
          class="w-full p-3 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-300 transition"
        />
      </div>

      <select
        id="opener"
        class="w-full p-3 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-indigo-300 transition"
      >
        <option disabled selected>Select an opener...</option>
        <option>It’s nice to hear from you,</option>
        <option>I appreciate you contacting us,</option>
        <option>We’re glad you got in touch</option>
        <option>We appreciate you taking the time to contact us.</option>
        <option>Thank you for bringing this to our attention.</option>
        <option>I hope this email reaches you well.</option>
        <option>I pray this email reaches you at a good time.</option>
        <option>I wish this email finds you in good spirits.</option>
        <option>I hope this email finds you well and safe.</option>
        <option>I hope this email reaches you in good health.</option>
        <option>I trust this email finds you doing great today.</option>
        <option>I hope this email finds you having a good day so far.</option>
        <option>
          I hope this email finds you well and your week’s off to a good start.
        </option>
        <option>
          I trust this email finds you well and everything’s going smoothly.
        </option>
        <option>
          I hope this email finds you well and thank you for reaching out.
        </option>
        <option>
          I hope this email finds you in good spirits and ready for the weekend.
        </option>
        <option>
          I hope this email finds you well — thank you for your patience.
        </option>
        <option>
          I trust this email finds you well and safe on your side.
        </option>
      </select>

      <textarea
        id="body"
        cols="3"
        rows="4"
        placeholder="Write your message..."
        class="border w-full outline-none p-3 rounded-lg border-gray-200 focus:ring-2 focus:ring-indigo-300 transition bg-gray-50"
      ></textarea>

      <div class="flex items-center gap-2">
        <select
          id="closure"
          class="w-full p-3 border rounded-lg mt-1 outline-none border-gray-200 focus:ring-2 focus:ring-indigo-300 transition"
        >
          <option disabled selected>Select a closing...</option>
          <option>Best regards,</option>
          <option>Kind regards,</option>
          <option>Warm regards,</option>
          <option>Sincerely,</option>
          <option>Yours sincerely,</option>
          <option>Yours faithfully,</option>
          <option>Respectfully,</option>
          <option>With appreciation,</option>
          <option>With best regards,</option>
          <option>Yours truly,</option>
        </select>

        <input
          type="text"
          id="sender"
          placeholder="Sender Name"
          class="w-full p-3 border border-gray-200 rounded-lg mt-1 outline-none focus:ring-2 focus:ring-indigo-300 transition"
        />
      </div>

      <div class="flex flex-col gap-2 mt-3">
        <button
          id="generate"
          class="bg-indigo-500 hover:bg-indigo-600 text-white font-semibold px-5 py-3 rounded-lg shadow transition"
        >
          Generate Template
        </button>

        <button
          id="copy"
          class="bg-emerald-500 hover:bg-emerald-600 text-white font-semibold px-5 py-3 rounded-lg shadow transition"
        >
          Copy to clipboard
        </button>
      </div>
    </div>

    <script src="js/mine.js"></script>
  </body>
</html>
